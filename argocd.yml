---
- name: Install ArgoCD on K3s
  hosts: uat
  tasks:
    - name: Create argocd namespace
      shell: k3s kubectl create namespace argocd --dry-run=client -o yaml | k3s kubectl apply -f -
      changed_when: false

    - name: Install ArgoCD (core only, no applicationset)
      shell: |
        curl -sL https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml | \
          sed '/applicationset/,/^---/d' | k3s kubectl apply -n argocd -f -
      args:
        creates: /usr/local/bin/argocd

    - name: Wait for ArgoCD pods
      shell: k3s kubectl wait --for=condition=Ready pods --all -n argocd --timeout=180s
      changed_when: false

    - name: Patch server to LoadBalancer
      shell: k3s kubectl patch svc argocd-server -n argocd -p '{"spec":{"type":"LoadBalancer"}}'
      changed_when: false

    - name: Get initial admin password
      shell: k3s kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
      register: argocd_pass
      changed_when: false

    - name: Print ArgoCD info
      debug:
        msg:
          - "ArgoCD URL: http://__UAT_HOST__:31867"
          - "Admin password: {{ argocd_pass.stdout }}"
          - "Login: admin / {{ argocd_pass.stdout }}"
