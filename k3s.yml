---
- name: Install K3s on UAT server
  hosts: uat
  vars:
    k3s_url: https://get.k3s.io

  tasks:
    - name: Install K3s (latest stable)
      shell: |
        curl -sfL {{ k3s_url }} | sh -
      args:
        creates: /usr/local/bin/k3s
      register: k3s_install

    - name: Wait for node ready
      shell: k3s kubectl wait --for=condition=Ready node --all --timeout=120s
      changed_when: false
      when: k3s_install.changed

    - name: Get kubeconfig
      shell: cat /etc/rancher/k3s/k3s.yaml
      register: kubeconfig
      changed_when: false

    - name: Show node status
      shell: k3s kubectl get nodes -o wide
      register: nodes
      changed_when: false

    - name: Print node info
      debug:
        var: nodes.stdout_lines
