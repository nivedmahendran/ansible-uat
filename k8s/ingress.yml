apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: myapp
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: myapp-issuer
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - 63.250.52.122.nip.io
      secretName: app-tls
  rules:
    - host: 63.250.52.122.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 5000
