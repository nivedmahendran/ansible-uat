name: Deploy to UAT

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible --user
          sudo apt update -qq
          sudo apt install -y -qq rsync

      - name: Create inventory
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UAT_SSH_KEY }}" > ~/.ssh/uatserver
          chmod 600 ~/.ssh/uatserver
          cat > inventory.ini <<EOF
          [uat]
          ${{ secrets.UAT_HOST }} ansible_user=${{ secrets.UAT_USER }} ansible_ssh_private_key_file=~/.ssh/uatserver

          [all:vars]
          ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Decrypt vault
        run: echo "${{ secrets.VAULT_PASSWORD }}" > .vault_password

      - name: Run deploy playbook
        run: ansible-playbook -i inventory.ini deploy.yml --vault-password-file .vault_password
