name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint and Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          pip install yamllint ansible-lint --user
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Lint YAML
        run: yamllint k8s/ deploy.yml docker.yml k3s.yml certmanager.yml argocd.yml

      - name: Lint Ansible
        run: ansible-lint deploy.yml docker.yml k3s.yml certmanager.yml argocd.yml

      - name: Validate K8s manifests
        run: |
          curl -sLO "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          sed -i 's/__UAT_HOST__/validate.local/g' k8s/ingress.yml
          kubectl apply -f k8s/ --dry-run=client -o yaml > /dev/null

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan K8s manifests with Trivy
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: config
          scan-ref: k8s/
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Scan Dockerfile with Trivy
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: config
          scan-ref: app/Dockerfile
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Scan Helm chart with Trivy
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: config
          scan-ref: helm-chart/
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

  deploy:
    name: Deploy to UAT
    needs: [lint, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible --user
          sudo apt update -qq
          sudo apt install -y -qq rsync
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create inventory
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UAT_SSH_KEY }}" > ~/.ssh/uatserver
          chmod 600 ~/.ssh/uatserver
          ssh-keyscan -H ${{ secrets.UAT_HOST }} >> ~/.ssh/known_hosts
          cat > inventory.ini <<EOF
          [uat]
          ${{ secrets.UAT_HOST }} ansible_user=${{ secrets.UAT_USER }} ansible_ssh_private_key_file=~/.ssh/uatserver ansible_ssh_common_args='-o StrictHostKeyChecking=no'

          [all:vars]
          ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Create ansible.cfg
        run: |
          cat > ansible.cfg <<EOF
          [defaults]
          host_key_checking = False
          EOF

      - name: Decrypt vault
        run: echo "${{ secrets.VAULT_PASSWORD }}" > .vault_password

      - name: Substitute host placeholder
        run: |
          UAT_HOST="${{ secrets.UAT_HOST }}.nip.io"
          find k8s/ argocd.yml -type f -exec sed -i "s/__UAT_HOST__/$UAT_HOST/g" {} +

      - name: Deploy with Ansible
        run: ansible-playbook -i inventory.ini deploy.yml --vault-password-file .vault_password

      - name: Deploy K8s manifests to K3s
        run: |
          rsync -avz -e "ssh -i ~/.ssh/uatserver -o StrictHostKeyChecking=no" \
            k8s/ ${{ secrets.UAT_USER }}@${{ secrets.UAT_HOST }}:/opt/myapp/k8s/
          ssh -i ~/.ssh/uatserver -o StrictHostKeyChecking=no \
            ${{ secrets.UAT_USER }}@${{ secrets.UAT_HOST }} \
            "k3s kubectl apply -f /opt/myapp/k8s/"
